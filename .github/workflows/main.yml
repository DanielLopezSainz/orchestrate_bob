name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          # This points to the directory containing your backend and frontend folders
          context: ./Orchestrate_Demo_Documentation/Project_vG
          # This points to the specific Dockerfile inside that folder
          file: ./Orchestrate_Demo_Documentation/Project_vG/Dockerfile
          push: true
          # The image name you requested
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ibm-orchestrate-demo:latest
